name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > mobile/android/local.properties

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate and copy APK
        run: |
          APK=$(find mobile/android -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" kirpi-finans.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-v${{ github.run_number }}
          path: kirpi-finans.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kirpi Finans - Build ${{ github.run_number }}"
          body: "APK test sürümü. Telefona direkt yüklenebilir."
          files: kirpi-finans.apk
          prerelease: true
          fail_on_unmatched_files: false
