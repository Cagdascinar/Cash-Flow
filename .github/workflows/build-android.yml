name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > mobile/android/local.properties

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
          echo "Gradle exit: ${PIPESTATUS[0]}"

      - name: Find APKs
        if: always()
        run: |
          echo "=== APK arama ==="
          find mobile/android -name "*.apk" 2>/dev/null || echo "APK bulunamadi"
          echo "=== Son 30 satir log ==="
          tail -30 /tmp/gradle.log 2>/dev/null || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-${{ github.run_number }}
          path: mobile/android/**/*.apk
          if-no-files-found: warn
          retention-days: 14
