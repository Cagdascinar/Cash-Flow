name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-35" \
            2>&1 | tail -5

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > mobile/android/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> mobile/android/local.properties

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "=== HATA ==="
            grep -E "^.*[Ee]rror:|FAILED|Exception|Could not" /tmp/gradle.log | grep -v "^Note:" | head -40
            echo "=== SON 20 SATIR ==="
            tail -20 /tmp/gradle.log
            exit $STATUS
          fi

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ github.run_number }}
          path: /tmp/gradle.log
          retention-days: 7

      - name: Locate APK
        run: |
          APK=$(find mobile/android -name "*.apk" | grep -v "unsigned" | head -1)
          echo "APK: $APK"
          cp "$APK" kirpi-finans.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-v${{ github.run_number }}
          path: kirpi-finans.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kirpi Finans - Build ${{ github.run_number }}"
          body: "Android APK - Test sürümü"
          files: kirpi-finans.apk
          prerelease: true
          fail_on_unmatched_files: false
