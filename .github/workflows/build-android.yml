name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: https://web-production-ba700.up.railway.app
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Generate keystore
        working-directory: mobile/android
        run: |
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -alias kirpi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Kirpi Finans,O=Kirpi,C=TR" \
            -storepass kirpi123 -keypass kirpi123

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password=kirpi123 \
            -Pandroid.injected.signing.key.alias=kirpi \
            -Pandroid.injected.signing.key.password=kirpi123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-v${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
