name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Generate keystore
        working-directory: mobile/android
        run: |
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -alias kirpi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Kirpi Finans,O=Kirpi,C=TR" \
            -storepass kirpi123 -keypass kirpi123

      - name: Build Release APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password=kirpi123 \
            -Pandroid.injected.signing.key.alias=kirpi \
            -Pandroid.injected.signing.key.password=kirpi123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
