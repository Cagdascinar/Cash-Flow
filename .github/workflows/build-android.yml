name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: https://web-production-ba700.up.railway.app
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== GRADLE FAILED - Last 200 lines ==="
            tail -200 /tmp/gradle-build.log
            exit $BUILD_EXIT
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Show APK info
        run: |
          APK=mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK built successfully!"
            ls -lh "$APK"
          else
            echo "APK not found"
            find mobile/android -name "*.apk" 2>/dev/null
          fi
