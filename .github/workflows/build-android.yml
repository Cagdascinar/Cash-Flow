name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: https://web-production-ba700.up.railway.app
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50
          echo "Exit: ${PIPESTATUS[0]}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Find APK
        if: always()
        run: find mobile/android -name "*.apk" 2>/dev/null || echo "APK bulunamadi"
