name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: https://web-production-ba700.up.railway.app
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Generate release keystore
        working-directory: mobile/android
        run: |
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -alias kirpi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Kirpi Finans,O=Kirpi,C=TR" \
            -storepass kirpi123 -keypass kirpi123

      - name: Build Release APK
        working-directory: mobile/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=kirpi123 \
            -Pandroid.injected.signing.key.alias=kirpi \
            -Pandroid.injected.signing.key.password=kirpi123 \
            2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== GRADLE FAILED - Last 150 lines ==="
            tail -150 /tmp/gradle-build.log
            exit $BUILD_EXIT
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kirpi-finans-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Show APK info
        run: |
          APK=mobile/android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then
            echo "APK built successfully!"
            ls -lh "$APK"
          else
            echo "APK not found"
            find mobile/android -name "*.apk" 2>/dev/null
          fi
